apis:
  - aid: microsoft-stream:graph-video-api
    name: Microsoft Graph Stream Video API
    tags:
      - Video
      - Streaming
      - Microsoft Graph
      - SharePoint
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://graph.microsoft.com/v1.0/
    humanURL: https://learn.microsoft.com/en-us/stream/
    properties:
      - url: https://learn.microsoft.com/en-us/stream/
        type: Documentation
    description: >-
      Microsoft Stream (on SharePoint) provides video management capabilities
      through Microsoft Graph and SharePoint APIs. Videos are stored in
      OneDrive and SharePoint, enabling developers to upload, manage,
      share, and embed enterprise videos using existing Graph drive and
      file APIs with video-specific metadata and playback support.
